services:
  web:
    build: .
    ports:
      - "${PORT}:80"
    environment:
      PORT: $[PORT:-8888}
    volumes:
      - files_data:/var/www/html/web/sites/default/files
      - private_data:/var/www/html/web/sites/private_files
    depends_on:
      - db

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-openintranet}
      MYSQL_USER: ${MYSQL_USER:-dbuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dbpassword}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  files_data:
  private_data:
